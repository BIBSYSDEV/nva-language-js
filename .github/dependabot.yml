version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 5
    groups:
      babel:
        patterns:
          - "@babel/*"
          - "babel-plugin-*"
      eslint:
        patterns:
          - "eslint*"
          - "eslint-config-*"
          - "eslint-plugin-*"
      mocha-chai:
        patterns:
          - "mocha"
          - "chai"
